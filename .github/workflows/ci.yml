name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install UV
        run: pip install uv

      - name: Install dependencies with UV
        run: |
          uv pip install --system ruff

      - name: Run ruff lint
        run: ruff check vllm_mlx/ tests/

      - name: Run ruff format check
        run: ruff format --check vllm_mlx/ tests/

      - name: CLI ↔ Config fidelity audit
        run: python scripts/audit_cli_config_fidelity.py

      - name: GitHub Actions SHA pinning (advisory)
        continue-on-error: true
        run: python scripts/check_gha_pinning.py

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        run: pip install uv

      - name: Install types with UV
        run: |
          uv pip install --system mypy pydantic fastapi

      - name: Run mypy
        run: mypy vllm_mlx/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install UV
        run: pip install uv

      - name: Install test deps with UV
        run: |
          uv pip install --system pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

